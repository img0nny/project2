<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>서울더리본치과 볼링경기 상품추첨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; color: white; }
        .title-font { font-family: 'Black Han Sans', sans-serif; }
        .comic-font { font-family: 'Jua', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .pop-up { animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popUp { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 50%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }
        
        /* 효과 스타일 */
        .btn-glow { box-shadow: 0 0 20px rgba(236, 72, 153, 0.4); }
        .result-card { box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
        .cert-box { background: rgba(255, 255, 255, 0.05); border: 1px dashed rgba(255, 255, 255, 0.2); }
        
        /* 스크롤바 숨기기 (관리자 리스트용) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="relative">

    <!-- 라이브 동기화 뱃지 -->
    <div class="absolute top-4 left-4 flex items-center gap-1 bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-[10px] font-bold border border-emerald-500/30 shadow-lg z-50">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        LIVE 동기화 중
    </div>

    <!-- 관리자용 입장 버튼 -->
    <button onclick="window.enterAdminMode()" class="fixed bottom-2 right-2 text-[10px] text-slate-500 bg-slate-800/50 px-2 py-1 rounded opacity-30 hover:opacity-100 z-50 transition-all">
        관리자 모드
    </button>

    <div id="app" class="w-full max-w-md mx-auto p-6 flex-1 flex flex-col pt-12">
        <!-- 서버 연결 로딩 화면 -->
        <div id="loading-view" class="flex-1 flex justify-center items-center text-slate-400 text-lg font-bold flex-col gap-4">
            <div class="text-5xl animate-bounce">🎳</div>
            <p class="animate-pulse text-sm font-medium text-slate-400">데이터를 동기화 중입니다...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 사용자 Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyAlrDE_xgT6VBwEQ7AtqEkPfIng6tuK38g",
            authDomain: "img0nny.firebaseapp.com",
            projectId: "img0nny",
            storageBucket: "img0nny.firebasestorage.app",
            messagingSenderId: "28395677092",
            appId: "1:28395677092:web:603c15d52699f0fe03cd31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "bowling_event", "prizes");

        // 초기 박스 세팅
        const initialBoxes = {
            1: { id: 1, title: "1등 팀 골드 박스", emoji: "🥇", colorClass: "bg-yellow-500", textClass: "text-yellow-900", prizes: [{ name: "올리브영 5만원", icon: "💄", type: "jackpot" }, { name: "배달의민족 3만원", icon: "🍗", type: "good" }, { name: "스타벅스 1만원", icon: "☕", type: "normal" }, { name: "스타벅스 1만원", icon: "☕", type: "normal" }] },
            2: { id: 2, title: "2등 팀 실버 박스", emoji: "🥈", colorClass: "bg-slate-300", textClass: "text-slate-800", prizes: [{ name: "올리브영 3만원", icon: "🌿", type: "good" }, { name: "배달의민족 3만원", icon: "🍗", type: "good" }, { name: "스타벅스 1만원", icon: "☕", type: "normal" }, { name: "스타벅스 1만원", icon: "☕", type: "normal" }] },
            3: { id: 3, title: "3등 팀 브론즈 박스", emoji: "🥉", colorClass: "bg-amber-600", textClass: "text-white", prizes: [{ name: "올리브영 3만원", icon: "🌿", type: "good" }, { name: "스타벅스 1만원", icon: "☕", type: "normal" }, { name: "스타벅스 1만원", icon: "☕", type: "normal" }, { name: "스타벅스 1만원", icon: "☕", type: "normal" }] },
            4: { id: 4, title: "4등 팀 그린 박스", emoji: "😅", colorClass: "bg-emerald-500", textClass: "text-white", prizes: [{ name: "배달의민족 3만원", icon: "🍗", type: "good" }, { name: "스타벅스 1만원", icon: "☕", type: "normal" }, { name: "스타벅스 1만원", icon: "☕", type: "normal" }, { name: "스타벅스 1만원", icon: "☕", type: "normal" }] }
        };

        window.boxesData = null;
        window.winnersData = []; // 당첨자 명단 관리용 배열
        const appDiv = document.getElementById('app');

        // 서버 감시 및 화면 제어
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                window.boxesData = data.boxes;
                window.winnersData = data.winners || []; // 서버에서 당첨자 명단 가져오기
                
                const serverResetTime = data.lastReset || 0;
                const localResetTime = localStorage.getItem('lastResetTime') || 0;
                if (serverResetTime > localResetTime) {
                    localStorage.removeItem('myDrawResult');
                    localStorage.removeItem('myNickname'); // 닉네임도 함께 초기화
                    localStorage.setItem('lastResetTime', serverResetTime);
                }
                
                // 현재 화면 상태 유지 및 자동 페이지 이동
                const savedResult = localStorage.getItem('myDrawResult');
                
                if (window.currentView === 'admin') {
                    window.renderAdminScreen(); // 관리자 화면일 경우 리스트 실시간 새로고침
                } else if (savedResult) {
                    const result = JSON.parse(savedResult);
                    window.renderResultScreen(result.boxTitle, result.prize, true);
                } else if (!window.currentView || window.currentView === 'loading' || window.currentView === 'home') {
                    window.renderHomeScreen();
                } else if (window.currentView === 'team_select') {
                    window.renderTeamSelectScreen();
                } else if (window.currentView === 'draw' && window.selectedBoxId) {
                    window.renderDrawScreen(window.selectedBoxId);
                }
            } else {
                // 문서 최초 생성 시 winners 빈 배열 추가
                setDoc(docRef, { boxes: initialBoxes, winners: [], lastReset: new Date().getTime() });
            }
        });

        // 1. 홈 화면 (닉네임 입력 추가)
        window.renderHomeScreen = function() {
            window.currentView = 'home';
            // 이전에 입력한 닉네임이 있다면 불러오기
            const savedNick = localStorage.getItem('myNickname') || '';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in">
                    <div class="mb-6 text-6xl">🎳</div>
                    <h2 class="text-xl font-bold text-pink-400 mb-2 comic-font">반전의 랜덤박스</h2>
                    <h1 class="text-4xl md:text-5xl title-font text-white mb-8 leading-tight">
                        서울더리본치과<br>볼링경기 상품추첨
                    </h1>
                    
                    <!-- 닉네임 입력 폼 -->
                    <div class="w-full max-w-[280px] mb-6">
                        <input type="text" id="nickInput" value="${savedNick}" placeholder="본인의 이름을 입력하세요" class="w-full bg-slate-800/80 border border-slate-600 text-white rounded-xl px-4 py-3 text-center text-lg focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 placeholder-slate-500 transition-all font-bold">
                    </div>

                    <button onclick="window.checkNicknameAndStart()" class="btn-glow bg-gradient-to-r from-pink-500 to-purple-600 text-white font-black py-4 px-12 rounded-full text-xl hover:scale-105 active:scale-95 transition-all">
                        추첨 시작하기!
                    </button>
                    <p class="mt-8 text-slate-500 text-sm italic">"과연 금손 타이틀을 거머쥘 주인공은?"</p>
                </div>
            `;
        };

        // 1-1. 닉네임 검증 및 팀 선택 화면 이동
        window.checkNicknameAndStart = function() {
            const nick = document.getElementById('nickInput').value.trim();
            if (!nick) {
                alert("이름(닉네임)을 반드시 입력해주세요!");
                document.getElementById('nickInput').focus();
                return;
            }
            // 닉네임 로컬에 저장
            localStorage.setItem('myNickname', nick);
            window.renderTeamSelectScreen();
        };

        // 2. 팀 선택 화면
        window.renderTeamSelectScreen = function() {
            window.currentView = 'team_select';
            const myNick = localStorage.getItem('myNickname');

            let html = `
                <div class="fade-in pb-10">
                    <button onclick="window.renderHomeScreen()" class="flex items-center gap-2 bg-slate-800/80 text-slate-400 px-4 py-2 rounded-full border border-slate-700 mb-8 transition-all hover:text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg>
                        <span class="text-sm font-bold font-sans">메인으로</span>
                    </button>
                    <h2 class="text-3xl title-font text-white mb-2 tracking-wide">팀을 골라주세요.</h2>
                    <p class="text-slate-400 text-sm mb-8 font-medium"><span class="text-pink-400 font-bold">${myNick}</span>님, 본인 팀의 카드를 터치하세요.</p>
                    <div class="grid grid-cols-1 gap-4">
            `;
            for (let i = 1; i <= 4; i++) {
                const box = window.boxesData[i];
                const count = box.prizes.length;
                const isEmpty = count === 0;
                
                const cleanTitle = box.title.replace(/🥇|🥈|🥉|🏅|4️⃣|😅|📦/g, '').trim(); 
                const fallbackEmoji = box.id === 1 ? '🥇' : box.id === 2 ? '🥈' : box.id === 3 ? '🥉' : '😅';
                const displayEmoji = box.emoji || fallbackEmoji;

                html += `
                    <div onclick="${isEmpty ? '' : `window.renderDrawScreen(${i})`}" 
                         class="relative rounded-2xl p-6 shadow-xl border border-white/5 transition-all ${isEmpty ? 'bg-slate-800/40 opacity-40 grayscale' : box.colorClass + ' cursor-pointer hover:scale-[1.02] active:scale-95'}">
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 class="text-2xl font-black ${isEmpty ? 'text-slate-500' : box.textClass} comic-font mb-1">${cleanTitle}</h2>
                                <p class="${isEmpty ? 'text-slate-600' : box.textClass} opacity-80 text-xs font-bold uppercase tracking-widest font-sans">
                                    남은 수량 : ${count} / 4
                                </p>
                            </div>
                            <div class="text-5xl drop-shadow-sm">${displayEmoji}</div>
                        </div>
                    </div>
                `;
            }
            appDiv.innerHTML = html + `</div></div>`;
        };

        // 3. 뽑기 화면
        window.renderDrawScreen = function(boxId) {
            window.currentView = 'draw';
            window.selectedBoxId = boxId;
            const box = window.boxesData[boxId];
            
            const cleanTitle = box.title.replace(/🥇|🥈|🥉|🏅|4️⃣|😅|📦/g, '').trim(); 
            const fallbackEmoji = box.id === 1 ? '🥇' : box.id === 2 ? '🥈' : box.id === 3 ? '🥉' : '😅';
            const displayEmoji = box.emoji || fallbackEmoji;

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in">
                    <button onclick="window.renderTeamSelectScreen()" class="absolute top-8 left-6 flex items-center gap-2 bg-slate-800/80 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-full border border-slate-700 transition-all text-sm font-bold shadow-lg font-sans">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg>
                        팀 다시 고르기
                    </button>
                    <h2 class="text-2xl title-font ${box.colorClass.replace('bg-', 'text-')} mb-8 drop-shadow-md">${displayEmoji} ${cleanTitle}</h2>
                    <div id="drawBox" class="text-[120px] mb-12 cursor-pointer drop-shadow-2xl transition-transform hover:scale-110 active:scale-90 shake" onclick="window.executeDraw(${boxId})">🎁</div>
                    <div class="animate-pulse">
                        <p class="text-2xl font-black text-white comic-font mb-2 text-pink-400">상자를 터치하세요!</p>
                        <p class="text-sm text-slate-400 font-bold tracking-tight">좋은 상품이 나오기를 기원합니다!</p>
                    </div>
                </div>
            `;
        };

        // 4. 추첨 로직 (트랜잭션 + 당첨자 명단 서버 기록 추가)
        window.executeDraw = async function(boxId) {
            const boxElement = document.getElementById('drawBox');
            if(boxElement.classList.contains('executing')) return;
            boxElement.classList.add('executing');
            
            const myNick = localStorage.getItem('myNickname') || '이름없음';

            try {
                const selectedPrize = await runTransaction(db, async (transaction) => {
                    const sfDoc = await transaction.get(docRef);
                    let latestData = sfDoc.data().boxes;
                    let winnersList = sfDoc.data().winners || [];
                    
                    let currentPrizes = latestData[boxId].prizes;
                    if (currentPrizes.length === 0) throw "EMPTY";
                    
                    const randomIndex = Math.floor(Math.random() * currentPrizes.length);
                    const prize = currentPrizes[randomIndex];
                    currentPrizes.splice(randomIndex, 1);
                    
                    // 관리자 페이지 확인용 당첨자 리스트에 추가
                    const cleanTitle = latestData[boxId].title.replace(/🥇|🥈|🥉|🏅|4️⃣|😅|📦/g, '').trim(); 
                    winnersList.unshift({ // 최신순 정렬을 위해 unshift 사용
                        nickname: myNick,
                        boxTitle: cleanTitle,
                        prizeName: prize.name,
                        prizeIcon: prize.icon,
                        timestamp: new Date().getTime()
                    });

                    // DB 최종 덮어쓰기
                    transaction.update(docRef, { boxes: latestData, winners: winnersList });
                    return prize;
                });

                setTimeout(() => {
                    localStorage.setItem('myDrawResult', JSON.stringify({ boxTitle: window.boxesData[boxId].title, prize: selectedPrize }));
                    window.renderResultScreen(window.boxesData[boxId].title, selectedPrize, false);
                }, 800);

            } catch (e) {
                boxElement.classList.remove('executing');
                if (e === "EMPTY") { alert("방금 전 상품이 모두 소진되었습니다."); window.renderTeamSelectScreen(); }
                else { alert("통신 오류가 발생했습니다. 잠시 후 시도하세요."); }
            }
        };

        // 5. 결과 확인 화면
        window.renderResultScreen = function(boxTitle, selectedPrize, isAlreadyDrawn) {
            window.currentView = 'result';
            const myNick = localStorage.getItem('myNickname') || '고객';
            let resultColor = 'from-slate-700 to-slate-800';
            if (selectedPrize.type === 'jackpot') resultColor = 'from-pink-500 to-rose-500';
            else if (selectedPrize.type === 'good') resultColor = 'from-blue-500 to-indigo-500';

            const cleanTitle = boxTitle.replace(/🥇|🥈|🥉|🏅|4️⃣|😅|📦/g, '').trim(); 

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col justify-center items-center text-center fade-in px-4 py-8">
                    <p class="text-yellow-400 font-bold text-xl mb-4 comic-font tracking-widest">${isAlreadyDrawn ? "나의 당첨 결과" : "🎉 축하합니다! 🎉"}</p>
                    
                    <div class="bg-gradient-to-br ${resultColor} w-full py-10 rounded-3xl shadow-2xl pop-up border border-white/20 relative overflow-hidden mb-8 result-card">
                        <div class="absolute inset-0 bg-white/10 opacity-40"></div>
                        <div class="text-[100px] mb-4 relative z-10 drop-shadow-xl animate-bounce">${selectedPrize.icon}</div>
                        <h2 class="text-3xl font-black text-white comic-font tracking-wide relative z-10 break-keep mb-2">${selectedPrize.name}</h2>
                        <p class="text-white/70 font-bold text-sm relative z-10 opacity-90">${cleanTitle}</p>
                    </div>

                    <!-- 인증 가이드 박스 -->
                    <div class="cert-box w-full p-5 rounded-2xl flex flex-col items-center gap-3 fade-in shadow-inner">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">📸</span>
                            <p class="text-lg font-black text-white comic-font"><span class="text-pink-400">${myNick}</span>님 수령 가이드</p>
                        </div>
                        <div class="h-px bg-white/10 w-full mb-1"></div>
                        <p class="text-slate-300 text-sm leading-relaxed break-keep font-medium">
                            위의 <span class="text-pink-400 font-bold underline underline-offset-4">당첨 화면을 캡처</span>하거나 
                            지금 바로 <span class="text-yellow-400 font-bold">기획자</span>에게 보여주시고
                            푸짐한 실물 상품을 수령하세요!
                        </p>
                        <div class="mt-2 flex items-center justify-center gap-1 bg-white/10 px-4 py-2 rounded-full border border-white/10">
                            <span class="text-pink-400">✨</span>
                            <span class="text-xs font-bold text-slate-400 font-sans tracking-tight uppercase">Present For You</span>
                            <span class="text-pink-400">✨</span>
                        </div>
                    </div>
                </div>
            `;
        };

        // ============================================
        // 🛠️ 관리자 모드 전용 로직
        // ============================================

        window.enterAdminMode = function() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === "0000") {
                window.renderAdminScreen();
            } else if (pw !== null) { 
                alert("비밀번호 불일치"); 
            }
        };

        window.renderAdminScreen = function() {
            window.currentView = 'admin';
            
            // 박스별 그룹화된 당첨 리스트 HTML 생성
            let listHTML = '';
            
            for (let i = 1; i <= 4; i++) {
                const originalBox = initialBoxes[i];
                const cleanTitle = originalBox.title.replace(/🥇|🥈|🥉|🏅|4️⃣|😅|📦/g, '').trim();
                
                // 1. 해당 박스의 오리지널 상품 구성(개수) 계산
                const prizeCounts = {};
                originalBox.prizes.forEach(p => {
                    prizeCounts[p.name] = (prizeCounts[p.name] || 0) + 1;
                });
                const compositionStr = Object.entries(prizeCounts).map(([name, count]) => `${name}(${count})`).join(', ');

                // 2. 이 박스에서 당첨된 사람들의 목록 필터링
                const boxWinners = window.winnersData.filter(w => w.boxTitle === cleanTitle);
                let winnersStr = '';
                if (boxWinners.length > 0) {
                    winnersStr = boxWinners.map(w => 
                        `<span class="bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-600 shadow-sm whitespace-nowrap text-sm">
                            <span class="text-pink-400 font-black">${w.prizeName}</span> 
                            <span class="text-slate-300 font-medium">(${w.nickname})</span>
                        </span>`
                    ).join(' ');
                } else {
                    winnersStr = '<span class="text-slate-500 text-sm mt-1">아직 당첨자가 없습니다.</span>';
                }

                // 3. 각 박스별 UI 조립
                listHTML += `
                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-700/80 mb-4 flex flex-col shadow-md">
                        <div class="flex justify-between items-center mb-1">
                            <h4 class="text-yellow-400 font-bold text-xl comic-font drop-shadow-md">${originalBox.emoji} ${cleanTitle}</h4>
                            <span class="text-[10px] font-bold bg-pink-500/20 text-pink-300 px-2 py-1 rounded-md">
                                ${boxWinners.length}명 당첨
                            </span>
                        </div>
                        <p class="text-[11px] text-slate-400 mb-3 break-keep bg-slate-800/40 p-2 rounded-lg inline-block">
                            <span class="font-bold text-slate-300">박스 구성 : </span> ${compositionStr}
                        </p>
                        <div class="w-full h-px bg-slate-700/50 mb-3"></div>
                        <div class="flex flex-wrap gap-2">
                            ${winnersStr}
                        </div>
                    </div>
                `;
            }

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col w-full fade-in pb-10">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl title-font text-white flex items-center gap-2"><span class="text-3xl">⚙️</span> 상품 추첨 확인</h2>
                        <button onclick="window.renderHomeScreen()" class="text-slate-400 text-sm hover:text-white bg-slate-800 px-3 py-1 rounded-full border border-slate-700 transition-all shadow-md">닫기 ✖</button>
                    </div>

                    <!-- 당첨자 실시간 현황 그룹 박스 -->
                    <div class="bg-slate-800/80 rounded-2xl border border-slate-700 p-4 mb-6 shadow-xl flex-1 flex flex-col backdrop-blur-sm">
                        
                        <!-- 스크롤 가능한 리스트 영역 -->
                        <div class="flex-1 overflow-y-auto no-scrollbar flex flex-col max-h-[55vh]">
                            ${listHTML}
                        </div>
                    </div>

                    <!-- 관리자용 초기화 로직 -->
                    <button onclick="window.resetData()" class="w-full bg-red-500/10 text-red-400 border border-red-500/30 py-4 rounded-xl font-bold hover:bg-red-500 hover:text-white transition-all shadow-lg flex justify-center items-center gap-2">
                        <span>🚨</span> 전체 데이터 초기화
                    </button>
                    <p class="text-center text-slate-500 text-[10px] mt-3">초기화 시 서버 수량과 참석자의 접속 기록이 모두 삭제됩니다.</p>
                </div>
            `;
        };

        window.resetData = async function() {
            if(confirm("🚨 경고: 모든 데이터(상품 수량 및 당첨 내역)를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.")) {
                const newResetTime = new Date().getTime();
                // 윈도우.winners를 포함하여 서버 데이터 완전히 빈 상태로 초기화
                await setDoc(docRef, { boxes: initialBoxes, winners: [], lastReset: newResetTime });
                alert("시스템이 완벽하게 초기화되었습니다.");
                window.renderHomeScreen();
            }
        };

    </script>
